name: Deploy to WordPress.org

on:
    workflow_dispatch:
        inputs:
            release_notes:
                description: 'Release Notes / Commit Message'
                required: true
                type: string
                default: 'Deploy plugin to WordPress.org'
            dry_run:
                description: 'Dry Run (simulate deployment without pushing to SVN)'
                required: true
                type: boolean
                default: false
            version:
                description: 'Version to deploy'
                required: true
                type: string

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Setup pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'

            - name: Install PHP dependencies
              run: composer install --no-dev --optimize-autoloader

            - name: Install JS dependencies
              run: pnpm install

            - name: Build assets
              run: pnpm run build

            - name: Deploy to WordPress.org
              uses: 10up/action-wordpress-plugin-deploy@stable
              env:
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
                  DRY_RUN: ${{ inputs.dry_run }}
                  COMMIT_MESSAGE: ${{ inputs.release_notes }}
                  VERSION: ${{ inputs.version }}
